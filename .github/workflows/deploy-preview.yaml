name: Server PR Preview Deployment

on:
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "app.yaml"
      - ".github/workflows/deploy-preview.yaml"

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Deploy the app
        id: deploy
        uses: digitalocean/app_action/deploy@v2
        with:
          deploy_pr_preview: "true"
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_TOKEN_SIGN_ALGO: ${{ secrets.AUTH0_TOKEN_SIGN_ALGO }}
          ALLOWED_URI: https://poketrivia.prathamjaiswal.com
          NODE_ENV: 24.14.0
          PORT: "8081"
      - name: Success Comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀🚀🚀 The app was successfully deployed at ${{ fromJson(steps.deploy.outputs.app).live_url }}.`
            })
      - name: Failure Comment
        if: failure()
        uses: actions/github-script@v7
        env:
          BUILD_LOGS: ${{ steps.deploy.outputs.build_logs }}
          DEPLOY_LOGS: ${{ steps.deploy.outputs.deploy_logs }}
        with:
          script: |
            const { BUILD_LOGS, DEPLOY_LOGS } = process.env;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `The app failed to be deployed. Logs can be found [here](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).
              
              ## Logs
              <details>
              <summary>Build logs</summary>
              \`\`\`
              ${BUILD_LOGS || 'No build logs available'}
              \`\`\`
              </details>
              <details>
              <summary>Deploy logs</summary>
              \`\`\`
              ${DEPLOY_LOGS || 'No deploy logs available'}
              \`\`\`
              </details>`
            })
